name: Build_Lenovo_sm8750_Image_Only
permissions:
  contents: read
  actions: write
on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: "📝選擇 KSU 類型"
        required: true
        type: choice
        options:
          - 'SukiSU'
          - 'ReSukiSU'
        default: 'ReSukiSU'
        
      kernel_version:
        description: "📝選擇內核版本"
        required: false
        type: choice
        options:
          - '6.6.56'
          - '6.6.89'
          - '6.6.102'
          - '6.6.118'
        default: '6.6.89'

      custom_kernel_suffix:
        description: "✏️ 自定義內核名稱 (留空則用官核)"
        required: false
        default: ''

      enable_bbg:
        description: "開啟BBG基帶守護"
        required: false
        default: false
        type: boolean

      enable_ReKernel:
        description: "啟用Re-Kernel支持"
        required: false
        default: true
        type: boolean
      
      enable_Adios:
        description: "啟用ADIOS IO調度"
        required: true
        default: true
        type: boolean

      enable_kpm:
        description: "啟用KPM"
        required: false
        default: true
        type: boolean
      
      enable_susfs:
        description: "啟用SUSFS"
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build_Kernel_${{ github.event.inputs.kernel_version }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KSU_TYPE: ${{ github.event.inputs.ksu_type }}
      KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
      CUSTOM_KERNEL_SUFFIX: ${{ github.event.inputs.custom_kernel_suffix }}
      ENABLE_REKERNEL: ${{ github.event.inputs.enable_ReKernel }}
      ENABLE_ADIOS: ${{ github.event.inputs.enable_Adios }}
      ENABLE_BBG: ${{ github.event.inputs.enable_bbg }}
      ENABLE_KPM: ${{ github.event.inputs.enable_kpm }}
      ENABLE_SUSFS: ${{ github.event.inputs.enable_susfs }}
    steps:
      - uses: actions/checkout@v5

      - name: ⚙️ Set Config (設置配置)
        run: |
          case "${{ env.KERNEL_VERSION }}" in
            "6.6.56") PATCH="2024-11" ; SUFFIX="-android15-8-g38447e018c92-ab12829524-4k" ; KTIME="Thu Dec 19 17:58:46 UTC 2024" ;;
            "6.6.89") PATCH="2025-06" ; SUFFIX="-android15-8-g14220ae4ce65-ab13680582-4k" ; KTIME="Mon Jun 23 07:30:57 UTC 2025" ;;
            "6.6.102") PATCH="2025-10" ; SUFFIX="-android15-8-g06bc416365ef-ab14559830-4k" ; KTIME="Tue Dec 9 15:43:22 UTC 2025" ;;
            "6.6.118") PATCH="2026-01" ; SUFFIX="-android15-8-g350f378eb496-ab14943902-4k" ; KTIME="Thu Feb 26 02:40:50 UTC 2026" ;;
          esac
          echo "PATCH_LEVEL=$PATCH" >> $GITHUB_ENV
          echo "KERNEL_TIME=$KTIME" >> $GITHUB_ENV
          if [ -z "${{ env.CUSTOM_KERNEL_SUFFIX }}" ]; then
            echo "DEFAULT_SUFFIX=$SUFFIX" >> $GITHUB_ENV
          else
            echo "DEFAULT_SUFFIX=${{ env.CUSTOM_KERNEL_SUFFIX }}" >> $GITHUB_ENV
          fi

      - name: 🛠 Install dependencies (安裝依賴與源碼)
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt install -y binutils python-is-python3 libssl-dev libelf-dev dos2unix p7zip-full zstd aria2
          
          # 下載編譯器
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18 && rm -f clang.zip
          
          # 下載構建工具
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o bt.zip
          unzip -q bt.zip && rm -f bt.zip
          
          # 下載內核源碼
          aria2c -s16 -x16 -k1M "https://github.com/showdo/Build_Lenovo_sm8750/releases/download/common/${{ env.PATCH_LEVEL }}.tar.gz" -o common.tar.gz
          mkdir -p common && tar -xzf common.tar.gz -C common && rm -f common.tar.gz
          
          # 去除 dirty 後綴
          [ -f common/scripts/setlocalversion ] && sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: 🔧 Add Features (添加補丁項目)
        run: |
          cd kernel_workspace
          # Re-Kernel 支持
          if [ "${{ env.ENABLE_REKERNEL }}" == "true" ]; then
            git clone https://github.com/Sakion-Team/Re-Kernel.git
            mkdir -p common/drivers/rekernel
            cp -r Re-Kernel/LKM-Source/* common/drivers/rekernel/
            sed -i '/endmenu/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
            echo "obj-\$(CONFIG_REKERNEL) += rekernel/" >> common/drivers/Makefile
            echo "CONFIG_REKERNEL=y" >> common/arch/arm64/configs/gki_defconfig
          fi
          
          # 優化補丁
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8750.git
          cp oppo_oplus_realme_sm8750/zram_patch/*.patch common/
          cd common
          git apply 001-lz4.patch || true
          [ "${{ env.ENABLE_ADIOS }}" == "true" ] && echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> arch/arm64/configs/gki_defconfig

      - name: ⚙️ Setup KSU & SUSFS
        run: |
          cd kernel_workspace
          if [ "${{ env.KSU_TYPE }}" == 'ReSukiSU' ]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
          fi
          
          if [ "${{ env.ENABLE_SUSFS }}" == 'true' ]; then
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git -b oki-android15-6.6
            cp susfs4oki/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch common/
            cp -r susfs4oki/kernel_patches/fs/* common/fs/
            cp -r susfs4oki/kernel_patches/include/linux/* common/include/linux/
            cd common && patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          fi

      - name: 🔨 Build Kernel (編譯 Image)
        run: |
          # 使用絕對路徑確保不會找不到目錄
          ROOT_DIR="${{ github.workspace }}/kernel_workspace"
          cd $ROOT_DIR/common
          
          # 配置環境變數
          export PATH="$ROOT_DIR/clang18/bin:$ROOT_DIR/build-tools/bin:$PATH"
          export KBUILD_BUILD_TIMESTAMP="${{ env.KERNEL_TIME }}"
          
          # 安全替換內核名稱 (使用 : 作為分隔符避免自定義名稱含 / 報錯)
          ESCAPED_SUFFIX=$(echo "${{ env.DEFAULT_SUFFIX }}" | sed 's/[&/:]/\\&/g')
          sed -i "s:-4k:${ESCAPED_SUFFIX}:g" arch/arm64/configs/gki_defconfig
          
          # 基礎配置
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          
          # 開始編譯
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out Image

      - name: 📦 Patch KPM (可選)
        if: ${{ env.ENABLE_KPM == 'true' }}
        run: |
          cd ${{ github.workspace }}/kernel_workspace/common/out/arch/arm64/boot
          curl -LO https://github.com/ShirkNeko/SukiSU_KernelPatch_patch/releases/download/0.12.2/patch_linux
          chmod +x patch_linux && ./patch_linux
          [ -f oImage ] && mv oImage Image

      - name: 📤 Upload Image
        uses: actions/upload-artifact@v5
        with:
         name: Kernel_Image_${{ env.KERNEL_VERSION }}_${{ env.KSU_TYPE }}
         path: kernel_workspace/common/out/arch/arm64/boot/Image
